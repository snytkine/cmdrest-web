<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CmdRest — a blazing-fast, zero-code command line tool for testing REST APIs. Define test suites in YAML, run them anywhere: macOS, Windows and Linux."
    />
    <meta name="theme-color" content="#f8fafc" />
    <!-- Open Graph tags so links shared on social platforms render a rich preview. -->
    <meta property="og:title" content="CmdRest — Zero-Code REST API Testing from the Command Line" />
    <meta
      property="og:description"
      content="Write API test suites in plain YAML. Native binaries for macOS, Windows and Linux. 50+ assertions, HTML reports, CI/CD ready."
    />
    <meta property="og:type" content="website" />
    <!-- Self-hosted-style font loading: Inter for UI text, JetBrains Mono for code. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>CmdRest — Zero-Code REST API Testing CLI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Restores the real path (encoded by public/404.html) before
      // React Router mounts, so the app renders the route the user
      // actually requested.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
